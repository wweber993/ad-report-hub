{% extends "base.html" %}
{% block title %}Report Vulns{% endblock %}

{% block extra_css %}
<style>
  /* Remove page-content padding for this full-height layout */
  .page-content { padding: 0 !important; }

  .vulns-layout {
    display: flex;
    height: calc(100vh - var(--topbar-height, 60px));
    overflow: hidden;
  }

  /* ── Sub-sidebar ── */
  .vulns-subnav {
    width: 230px;
    min-width: 230px;
    background: #0f172a;
    border-right: 1px solid #1e293b;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 12px 0;
  }

  .subnav-section {
    padding: 6px 14px 2px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #475569;
    margin-top: 8px;
  }

  .subnav-link {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 16px;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    border-left: 3px solid transparent;
    transition: background .15s, color .15s, border-color .15s;
    cursor: pointer;
    background: none;
    border-top: none;
    border-right: none;
    border-bottom: none;
    width: 100%;
    text-align: left;
  }

  .subnav-link:hover {
    background: #1e293b;
    color: #e2e8f0;
  }

  .subnav-link.active {
    background: #1e293b;
    color: #38bdf8;
    border-left-color: #38bdf8;
  }

  .subnav-link i {
    width: 16px;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* ── Content iframe ── */
  .vulns-content {
    flex: 1;
    position: relative;
    background: #f4f7fa;
  }

  .vulns-content iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .vulns-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #64748b;
    gap: 12px;
  }

  .vulns-placeholder i {
    font-size: 56px;
    color: #38bdf8;
  }

  .vulns-placeholder h2 {
    font-size: 20px;
    font-weight: 600;
    color: #1e293b;
  }

  .vulns-placeholder p {
    font-size: 14px;
    max-width: 380px;
    text-align: center;
  }
</style>
{% endblock %}

{% block content %}
<div class="vulns-layout">

  <!-- Sub-navegação -->
  <nav class="vulns-subnav">

    <div class="subnav-section">Relatórios</div>
    <button class="subnav-link" onclick="load('/vulns/diario', this)">
      <i class="bi bi-calendar-day"></i>Diário
    </button>
    <button class="subnav-link" onclick="load('/vulns/total', this)">
      <i class="bi bi-globe2"></i>Ambiente Completo
    </button>
    <button class="subnav-link" onclick="load('/vulns/fixed', this)">
      <i class="bi bi-check-circle"></i>Correções (Semanal)
    </button>
    <button class="subnav-link" onclick="load('/vulns/fixed_diario', this)">
      <i class="bi bi-calendar-check"></i>Correções (Diário)
    </button>
    <button class="subnav-link" onclick="load('/vulns/vulns_diario', this)">
      <i class="bi bi-exclamation-triangle"></i>Vulns Ativas
    </button>
    <button class="subnav-link" onclick="load('/vulns/produto', this)">
      <i class="bi bi-box-seam"></i>Por Produto
    </button>
    <button class="subnav-link" onclick="load('/vulns/java', this)">
      <i class="bi bi-filetype-java"></i>Específico: Java
    </button>
    <button class="subnav-link" onclick="load('/vulns/pplr', this)">
      <i class="bi bi-shield-check"></i>Compliance Vulns
    </button>
    <button class="subnav-link" onclick="load('/vulns/exploits', this)">
      <i class="bi bi-bug"></i>Exploits Ativos
    </button>

    <div class="subnav-section">Análises</div>
    <button class="subnav-link" onclick="load('/vulns/dashboard', this)">
      <i class="bi bi-pie-chart"></i>Dashboard Geral
    </button>
    <button class="subnav-link" onclick="load('/vulns/kpi', this)">
      <i class="bi bi-graph-up"></i>Gráficos de KPI
    </button>
    <button class="subnav-link" onclick="load('/vulns/top5', this)">
      <i class="bi bi-star"></i>Top 5 Vulnerabilidades
    </button>
    <button class="subnav-link" onclick="load('/vulns/top5-60', this)">
      <i class="bi bi-star-fill"></i>Top 5 Vulns (+60 dias)
    </button>
    <button class="subnav-link" onclick="load('/vulns/comparativo', this)">
      <i class="bi bi-arrow-left-right"></i>Análise Comparativa
    </button>

    <div class="subnav-section">Ferramentas</div>
    <button class="subnav-link" onclick="load('/vulns/hosts', this)">
      <i class="bi bi-server"></i>Consulta de Hosts
    </button>
    <button class="subnav-link" onclick="load('/vulns/patch', this)">
      <i class="bi bi-clock-history"></i>Patch Windows
    </button>
    <button class="subnav-link" onclick="load('/vulns/patch_linux', this)">
      <i class="bi bi-terminal"></i>Patch Linux
    </button>
    <button class="subnav-link" onclick="load('/vulns/compliance', this)">
      <i class="bi bi-clipboard-check"></i>Compliance Patch
    </button>
    <button class="subnav-link" onclick="load('/vulns/sistemas_operacionais', this)">
      <i class="bi bi-hdd-stack"></i>Sistemas Operacionais
    </button>
    <button class="subnav-link" onclick="load('/vulns/ativos', this)">
      <i class="bi bi-toggle-off"></i>Hosts Inativos
    </button>
    <button class="subnav-link" onclick="load('/vulns/tecnologia', this)">
      <i class="bi bi-cpu"></i>Tecnologia
    </button>

  </nav>

  <!-- Área de conteúdo -->
  <div class="vulns-content" id="vulnsContent">
    <div class="vulns-placeholder" id="vulnsPlaceholder">
      <i class="bi bi-shield-shaded"></i>
      <h2>Painel de Vulnerabilidades</h2>
      <p>Selecione um relatório no menu à esquerda para começar.</p>
    </div>
    <iframe id="vulnsFrame" style="display:none"></iframe>
  </div>

</div>

<script>
const frame       = document.getElementById('vulnsFrame');
const placeholder = document.getElementById('vulnsPlaceholder');
let   activeBtn   = null;

function load(url, btn) {
  frame.src = url;
  frame.style.display = 'block';
  placeholder.style.display = 'none';
  if (activeBtn) activeBtn.classList.remove('active');
  btn.classList.add('active');
  activeBtn = btn;
}

// Auto-open diario on load
document.addEventListener('DOMContentLoaded', () => {
  const diarioBtn = document.querySelector('[onclick*="/vulns/diario"]');
  if (diarioBtn) load('/vulns/diario', diarioBtn);
});
</script>
{% endblock %}

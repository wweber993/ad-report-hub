{% extends "base.html" %}
{% block title %}Alterar Senha{% endblock %}

{% block breadcrumb %}
  <span class="bc-sep"><i class="bi bi-chevron-right"></i></span>
  <span class="bc-current">Alterar Senha</span>
{% endblock %}

{% block content %}
<div class="fade-up" style="max-width:480px; margin:0 auto;">

  <div class="card-hub">
    <div class="card-hub-header">
      <i class="bi bi-key-fill" style="color:var(--accent);"></i>
      Alterar Senha
    </div>
    <div class="card-hub-body">

      <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:24px;">
        Mantenha seu acesso seguro atualizando sua senha periodicamente.
      </p>

      <form action="{{ url_for('auth.change_password') }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div style="margin-bottom:16px;">
          <label class="form-label-hub">Senha Atual</label>
          <input type="password" name="old_password" class="form-hub"
                 placeholder="••••••••" required>
        </div>

        <hr style="border-color:var(--border); margin:20px 0;">

        <div style="margin-bottom:16px;">
          <label class="form-label-hub">Nova Senha</label>
          <input type="password" name="new_password" class="form-hub"
                 placeholder="Mínimo 8 caracteres" required minlength="8">
        </div>

        <div style="margin-bottom:24px;">
          <label class="form-label-hub">Confirmar Nova Senha</label>
          <input type="password" name="confirm_password" class="form-hub"
                 placeholder="Repita a nova senha" required>
        </div>

        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn-hub btn-primary" style="flex:1;">
            <i class="bi bi-check-lg"></i>
            Salvar Senha
          </button>
          <a href="{{ url_for('core.home') }}"
             class="btn-hub btn-secondary">
            Cancelar
          </a>
        </div>

      </form>
    </div>
  </div>

</div>
{% endblock %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — AD Report Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/cyberhub.css') }}">
</head>
<body class="auth-page">

  <div class="glass-card auth-card fade-up">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <i class="bi bi-shield-shaded"></i>
      </div>
      <div class="auth-title">AD Report Hub</div>
      <div class="auth-subtitle">Active Directory Security &amp; Analytics</div>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert-hub {{ category }}" style="margin-bottom:16px;">
            <i class="bi bi-{% if category == 'success' %}check-circle{% elif category == 'danger' %}exclamation-circle{% elif category == 'warning' %}exclamation-triangle{% else %}info-circle{% endif %}-fill"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('auth.login') }}" method="POST" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div style="margin-bottom:16px;">
        <label class="form-label-hub">Usuário</label>
        <div class="input-group-hub">
          <i class="bi bi-person-fill"></i>
          <input type="text" name="username" placeholder="Seu usuário"
                 autocomplete="username" required>
        </div>
      </div>

      <div style="margin-bottom:24px;">
        <label class="form-label-hub">Senha</label>
        <div class="input-group-hub" id="pwd-group">
          <i class="bi bi-lock-fill"></i>
          <input type="password" name="password" id="pwd-input" placeholder="••••••••"
                 autocomplete="current-password" required>
          <i class="bi bi-eye" id="pwd-toggle"
             style="cursor:pointer; flex-shrink:0;"
             onclick="togglePassword()"></i>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right" style="margin-right:6px;"></i>
        Entrar
      </button>
    </form>

    <div style="text-align:center; margin-top:24px; font-size:0.78rem; color:var(--text-muted);">
      AD Report Hub v1.0 &nbsp;·&nbsp; Active Directory Analytics
    </div>

  </div>

<script>
  function togglePassword() {
    const input  = document.getElementById('pwd-input');
    const toggle = document.getElementById('pwd-toggle');
    if (input.type === 'password') {
      input.type = 'text';
      toggle.className = 'bi bi-eye-slash';
    } else {
      input.type = 'password';
      toggle.className = 'bi bi-eye';
    }
  }
</script>
</body>
</html>

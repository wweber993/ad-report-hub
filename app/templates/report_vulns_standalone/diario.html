<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatório Diário por Severidade</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f6fa;
      margin: 0;
      padding: 30px;
      color: #2c3e50;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    .voltar {
      position: absolute;
      top: 20px;
      right: 30px;
    }
    .voltar a {
      background-color: #3498db;
      color: white;
      padding: 10px 16px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
    .filtro {
      text-align: center;
      margin: 20px 0 40px;
    }
    select {
      padding: 8px 12px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    .linha {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }
    .titulo-faixa {
      width: 100%;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 8px;
      color: #555;
    }
    .card {
      flex: 1 1 180px;
      max-width: 200px;
      background: white;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 {
      font-size: 32px;
      margin: 0;
    }
    .card p {
      margin-top: 5px;
      font-size: 15px;
      color: #666;
    }
    .critica { border-top: 5px solid #e74c3c; }
    .alta    { border-top: 5px solid #f39c12; }
    .media   { border-top: 5px solid #2980b9; }
    .baixa   { border-top: 5px solid #16a085; }
  </style>
</head>
<body>
<h1>Relatório Diário</h1>
<div class="filtro">
  <label for="ambiente">Selecionar Ambiente:</label>
  <select id="ambiente" onchange="renderizar()"></select>
</div>

<div id="container"></div>

<script>
  let dados = {};

  fetch('/vulns/data/diario')
    .then(response => response.json())
    .then(data => {
        dados = data;
        const select = document.getElementById('ambiente');
        Object.keys(dados).forEach(amb => {
          const opt = document.createElement('option');
          opt.value = amb;
          opt.textContent = amb;
          select.appendChild(opt);
        });
        select.value = Object.keys(dados)[0];
        renderizar();
      })
    .catch(err => console.error("Erro ao carregar diario_data.json:", err));

  function renderizar() {
    const ambiente = document.getElementById("ambiente").value;
    const info = dados[ambiente];
    const container = document.getElementById("container");
    container.innerHTML = "";

    const severidades = [
      { chave: "Crítica", classe: "critica" },
      { chave: "Alta", classe: "alta" },
      { chave: "Média", classe: "media" },
      { chave: "Baixa", classe: "baixa" },
    ];

    // Renderiza Resumo Geral
    const total = info["total"];
    if (total) {
      const tituloTotal = document.createElement("div");
      tituloTotal.className = "titulo-faixa";
      tituloTotal.textContent = "Resumo Geral";
      container.appendChild(tituloTotal);

      const linhaTotal = document.createElement("div");
      linhaTotal.className = "linha";

      severidades.forEach(({ chave, classe }) => {
        const card = document.createElement("div");
        card.className = `card ${classe}`;
        card.innerHTML = `
          <h2>${total[chave] || 0}</h2>
          <p>${chave}</p>
        `;
        linhaTotal.appendChild(card);
      });

      container.appendChild(linhaTotal);
    }

    // Renderiza por faixa de dias
    const faixas = ["0 a 30 dias", "31 a 60 dias", "Acima de 60 dias"];
    faixas.forEach(faixa => {
      const titulo = document.createElement("div");
      titulo.className = "titulo-faixa";
      titulo.textContent = faixa;
      container.appendChild(titulo);

      const linha = document.createElement("div");
      linha.className = "linha";

      severidades.forEach(({ chave, classe }) => {
        const card = document.createElement("div");
        card.className = `card ${classe}`;
        card.innerHTML = `
          <h2>${info[faixa]?.[chave] || 0}</h2>
          <p>${chave}</p>
        `;
        linha.appendChild(card);
      });

      container.appendChild(linha);
    });
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Executivo - KPIs</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --cor-primaria: #1a2942;
      --cor-secundaria: #3498db;
      --cor-fundo: #f5f6fa;
      --cor-card: #ffffff;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--cor-fundo);
      margin: 0;
      padding: 0;
    }
    header {
      background-color: var(--cor-primaria);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
    }
    .voltar a {
      background-color: var(--cor-secundaria);
      color: white;
      padding: 10px 16px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
    main {
      padding: 30px;
      max-width: 1400px;
      margin: auto;
    }
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-bottom: 40px;
    }
    .card {
      flex: 1 1 220px;
      max-width: 240px;
      background: var(--cor-card);
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      padding: 20px;
      text-align: center;
    }
    .card h2 {
      margin: 0;
      font-size: 32px;
      color: var(--cor-primaria);
    }
    .card p {
      margin-top: 6px;
      color: #666;
      font-size: 14px;
    }
    .graficos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 30px;
    }
    .grafico {
      background: var(--cor-card);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .grafico canvas {
      width: 100% !important;
      max-height: 360px !important;
    }
  </style>
</head>
<body>
<header>
  <h1>📊 Painel Executivo - Visão Geral</h1>
  <div class="voltar"><a href="index.html">&larr; Voltar</a></div>
</header>
<main>
  <div class="cards" id="cards"></div>
  <div class="graficos">
    <div class="grafico"><canvas id="chartSeveridadeHosts"></canvas></div>
    <div class="grafico"><canvas id="chartFaixaDias"></canvas></div>
    <div class="grafico"><canvas id="chartTopAmbientes"></canvas></div>
    <div class="grafico"><canvas id="chartTopHosts"></canvas></div>
    <div class="grafico"><canvas id="chartExploit"></canvas></div>
  </div>
</main>

<script>
fetch('/vulns/data/overview')
  .then(response => response.json())
  .then(data => {
    const cards = document.getElementById("cards");
    const totalVulns = Object.values(data.vulnerabilidades_por_severidade).reduce((a,b) => a + b, 0);

    cards.innerHTML = `
      <div class="card"><h2>${data.total_servidores}</h2><p>Total de Servidores</p></div>
      <div class="card"><h2>${totalVulns}</h2><p>Total de Vulnerabilidades</p></div>
      <div class="card"><h2>${data.media_dias_ativos}</h2><p>Média de Dias Ativos</p></div>
      <div class="card"><h2>${data.exploit.com_exploit}</h2><p>Servidores com Exploit</p></div>
    `;

    new Chart(document.getElementById('chartSeveridadeHosts'), {
      type: 'doughnut',
      data: {
        labels: Object.keys(data.servidores_por_severidade),
        datasets: [{
          data: Object.values(data.servidores_por_severidade),
          backgroundColor: ['#e74c3c','#f39c12','#3498db']
        }]
      },
      options: { plugins: { title: { display: true, text: 'Servidores por Severidade' } } }
    });

    new Chart(document.getElementById('chartFaixaDias'), {
      type: 'bar',
      data: {
        labels: Object.keys(data.faixa_dias_ativos),
        datasets: [{
          label: 'Servidores',
          data: Object.values(data.faixa_dias_ativos),
          backgroundColor: '#1a2942'
        }]
      },
      options: { plugins: { title: { display: true, text: 'Faixa de Dias Ativos por Servidor' } } }
    });

    new Chart(document.getElementById('chartTopAmbientes'), {
      type: 'bar',
      data: {
        labels: Object.keys(data.top_ambientes_critica_alta),
        datasets: [{
          label: 'Qtd Crítica + Alta',
          data: Object.values(data.top_ambientes_critica_alta),
          backgroundColor: '#2ecc71'
        }]
      },
      options: { plugins: { title: { display: true, text: 'Top 5 Ambientes com Mais Críticas + Altas' } } }
    });

    new Chart(document.getElementById('chartTopHosts'), {
      type: 'bar',
      data: {
        labels: Object.keys(data.top_hosts),
        datasets: [{
          label: 'Vulnerabilidades',
          data: Object.values(data.top_hosts),
          backgroundColor: '#9b59b6'
        }]
      },
      options: { plugins: { title: { display: true, text: 'Top 5 Hosts com Mais Vulnerabilidades' } } }
    });

    new Chart(document.getElementById('chartExploit'), {
      type: 'pie',
      data: {
        labels: ['Com Exploit', 'Sem Exploit'],
        datasets: [{
          data: [data.exploit.com_exploit, data.exploit.sem_exploit],
          backgroundColor: ['#e67e22','#95a5a6']
        }]
      },
      options: { plugins: { title: { display: true, text: 'Servidores com Exploits Conhecidos' } } }
    });
  });
</script>
</body>
</html>

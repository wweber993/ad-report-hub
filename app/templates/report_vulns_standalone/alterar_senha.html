
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Alterar Senha</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; }
    header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    main {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .form-container {
      background-color: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
    }
    h2 {
      color: #2c3e50;
      margin-bottom: 10px;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background-color: #2980b9;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #1f6391;
    }
    .msg {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
    .requisitos {
      font-size: 13px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <main>
    <div class="form-container">
      <h2>Trocar Senha</h2>
      <form id="formSenha">
        <label for="senha">Nova Senha:</label>
        <input type="password" id="senha" required>
        <label for="confirmar">Confirmar Nova Senha:</label>
        <input type="password" id="confirmar" required>

        <div class="requisitos">
          A senha deve conter no mínimo 12 caracteres, incluindo:<br>
          • letras maiúsculas<br>
          • letras minúsculas<br>
          • números<br>
          • símbolos (ex: !@#*&)
        </div>

        <button type="submit">Atualizar Senha</button>
        <div class="msg" id="msg"></div>
      </form>
    </div>
  </main>

  <script>
    document.getElementById("formSenha").addEventListener("submit", async function(e) {
      e.preventDefault();
      const senha = document.getElementById("senha").value;
      const confirmar = document.getElementById("confirmar").value;
      const msg = document.getElementById("msg");

      if (senha !== confirmar) {
        msg.textContent = "❌ As senhas não coincidem.";
        msg.style.color = "red";
        return;
      }

      const res = await fetch("/alterar_senha", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nova_senha: senha })
      });

      const resposta = await res.json();
      msg.textContent = resposta.mensagem;
      msg.style.color = resposta.status === "ok" ? "green" : "red";
    });
  </script>
</body>
</html>

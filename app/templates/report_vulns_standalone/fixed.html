      const countByHost = {};
      raw.forEach(r => {
        countByVuln[r.vuln] = (countByVuln[r.vuln] || 0) + 1;
        countByHost[r.host] = (countByHost[r.host] || 0) + 1;
      });
      const topVuln = Object.entries(countByVuln).sort((a,b) => b[1]-a[1])[0];
      const topHost = Object.entries(countByHost).sort((a,b) => b[1]-a[1])[0];

      kpis.innerHTML = `
        <div class="bg-white rounded-xl shadow p-4 text-center">
          <div class="text-sm text-gray-500">Vuln. mais corrigida</div>
          <div class="text-xl font-semibold text-blue-700">${topVuln[0]}</div>
          <div class="text-sm text-gray-600">${topVuln[1]} correções</div>
        </div>
        <div class="bg-white rounded-xl shadow p-4 text-center">
          <div class="text-sm text-gray-500">Host mais corrigido</div>
          <div class="text-xl font-semibold text-blue-700">${topHost[0]}</div>
          <div class="text-sm text-gray-600">${topHost[1]} correções</div>
        </div>
        <div class="bg-white rounded-xl shadow p-4 text-center">
          <div class="text-sm text-gray-500">Total de correções</div>
          <div class="text-2xl font-bold text-green-600">${raw.length}</div>
        </div>
        <div class="bg-white rounded-xl shadow p-4 text-center">
          <div class="text-sm text-gray-500">Vulnerabilidades únicas</div>
          <div class="text-2xl font-bold text-indigo-600">${Object.keys(countByVuln).length}</div>
        </div>
      `;
    }
  </script>
</body>
</html>

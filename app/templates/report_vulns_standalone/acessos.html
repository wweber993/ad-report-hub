<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatório de Acessos</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { text-align: center; color: #2c3e50; }
    input[type="text"] {
      width: 50%;
      padding: 10px;
      margin: 20px auto;
      display: block;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
      font-size: 14px;
    }
    tr:nth-child(even) { background-color: #f9f9f9; }
    th {
      background-color: #2c3e50;
      color: white;
    }
    .sucesso { color: green; font-weight: bold; }
    .falha { color: red; font-weight: bold; }
    .senha { color: orange; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Relatório de Acessos</h1>
  <input type="text" id="filtro" placeholder="Filtrar por usuário, IP, data...">
  <table id="tabela">
    <thead>
      <tr><th>Data/Hora</th><th>Tipo</th><th>Usuário</th><th>IP</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const tabela = document.querySelector("#tabela tbody");
    const filtro = document.getElementById("filtro");

    function renderizarTabela(linhas) {
      tabela.innerHTML = "";
      linhas.forEach(l => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${l.data}</td>
          <td class="${l.classe}">${l.tipo}</td>
          <td>${l.usuario}</td>
          <td>${l.ip}</td>
        `;
        tabela.appendChild(tr);
      });
    }

    function processarLog(texto) {
      const linhas = texto.split("\n").filter(l =>
        l.includes("Login") || l.includes("Tentativa inválida") || l.includes("Senha alterada")
      );
      const dados = linhas.map(l => {
        const data = l.substring(1, 20);
        let tipo = "", classe = "";
        if (l.includes("✅")) {
          tipo = "✅ Login";
          classe = "sucesso";
        } else if (l.includes("❌")) {
          tipo = "❌ Tentativa inválida";
          classe = "falha";
        } else if (l.includes("Senha alterada")) {
          tipo = "🔐 Alteração de senha";
          classe = "senha";
        }
        const usuario = l.match(/: (.*?) \(IP:/)?.[1] || "-";
        const ip = l.match(/IP: ([^)]+)/)?.[1] || "-";
        return { data, tipo, usuario, ip, classe };
      });
      return dados;
    }

    function filtrarTabela(event) {
      const termo = event.target.value.toLowerCase();
      const linhas = tabela.querySelectorAll("tr");
      linhas.forEach(linha => {
        linha.style.display = linha.innerText.toLowerCase().includes(termo) ? "" : "none";
      });
    }

    fetch("/static/logs/acessos.log")
      .then(res => res.text())
      .then(texto => renderizarTabela(processarLog(texto)));

    filtro.addEventListener("input", filtrarTabela);
  </script>
</body>
</html>

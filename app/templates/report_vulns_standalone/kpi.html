
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TOP 5 Ambientes</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
      color: #2c3e50;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
    }
    .voltar {
      position: absolute;
      top: 20px;
      right: 30px;
    }
    .voltar a {
      background-color: #3498db;
      color: white;
      padding: 10px 16px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
      margin-top: 20px;
    }
    .card {
      background: white;
      padding: 20px 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .card h3 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 18px;
      border-left: 6px solid #3498db;
      padding-left: 10px;
    }
    canvas {
      width: 100% !important;
      height: 220px !important;
      max-height: 220px;
    }
  </style>
</head>
<body>
  <h1>Top 5 Ambientes com mais Vulnerabilidades</h1>
  <div class="grid">
    <div class="card">
      <h3>Top 5 Ambientes - Crítica + Alta</h3>
      <canvas id="graficoGeral"></canvas>
    </div>
    <div class="card">
      <h3>Top 5 Ambientes - Críticas</h3>
      <canvas id="graficoCriticas"></canvas>
    </div>
    <div class="card">
      <h3>Top 5 Ambientes - Altas</h3>
      <canvas id="graficoAltas"></canvas>
    </div>
  </div>

  <script>
fetch('/vulns/data/diario')
  .then(response => response.json())
  .then(data => {
        const critAlta = [], criticas = [], altas = [];

        Object.entries(data).forEach(([ambiente, valores]) => {
          if (ambiente === "Todos") return;
          if (valores.total) {
            const total = valores.total;
            const c = total["Crítica"] || 0;
            const a = total["Alta"] || 0;
            if (c + a > 0) critAlta.push({ ambiente, valor: c + a });
            if (c > 0) criticas.push({ ambiente, valor: c });
            if (a > 0) altas.push({ ambiente, valor: a });
          }
        });

        const top5 = arr => arr.sort((a,b) => b.valor - a.valor).slice(0, 5);
        const labels = arr => arr.map(e => e.ambiente);
        const dados = arr => arr.map(e => e.valor);

        const criarGrafico = (id, titulo, dataset, cor) => {
          new Chart(document.getElementById(id), {
            type: 'bar',
            data: {
              labels: labels(dataset),
              datasets: [{
                label: titulo,
                data: dados(dataset),
                backgroundColor: cor
              }]
            },
            options: {
              responsive: true,
              plugins: {
                legend: { display: false },
                tooltip: {
                  callbacks: {
                    label: ctx => `${ctx.raw} vulnerabilidades`
                  }
                },
                datalabels: {
                  anchor: 'end',
                  align: 'end',
                  color: '#2c3e50',
                  font: { weight: 'bold', size: 11 },
                  formatter: Math.round
                }
              },
              scales: {
                y: {
                  beginAtZero: true,
                  ticks: { precision: 0 },
                  grid: { display: false }
                },
                x: {
                  grid: { display: false }
                }
              },
              animation: {
                duration: 700,
                easing: 'easeOutCubic'
              }
            },
            plugins: [ChartDataLabels]
          });
        };

        criarGrafico("graficoGeral", "Crítica + Alta", top5(critAlta), "#e67e22");
        criarGrafico("graficoCriticas", "Críticas", top5(criticas), "#e74c3c");
        criarGrafico("graficoAltas", "Altas", top5(altas), "#f1c40f");
      });
  </script>
</body>
</html>
